services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: wayflo
      POSTGRES_USER: wayflo
      POSTGRES_PASSWORD: wayflo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
